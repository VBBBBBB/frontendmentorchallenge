<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Manager</title>
    <!-- Use the same modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Include styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Include Lucide Icons script for pure HTML/JS -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root">
        <header>
            <div class="title-container">
                <h1>Extension Manager</h1>
                <p>Manage your browser extensions efficiently.</p>
            </div>
            
            <div class="controls">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search extensions...">
                </div>
                
                <select id="filterSelect" class="filter-select">
                    <option value="all">All Extensions</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <i data-lucide="moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <main>
            <div id="extensionGrid" class="extension-grid">
                <!-- Javascript will populate this -->
            </div>
            
            <div id="emptyState" class="empty-state" style="display: none;">
                <i data-lucide="settings" class="empty-icon-lg"></i>
                <h2>No extensions found</h2>
                <p>Try adjusting your search or filters.</p>
            </div>
        </main>

        <!-- Delete Confirmation Modal -->
        <div id="deleteModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3>Remove Extension?</h3>
                <p>Are you sure you want to remove <strong id="modalExtName"></strong>? This action cannot be undone.</p>
                <div class="modal-actions">
                    <button id="cancelBtn" class="btn btn-cancel">Cancel</button>
                    <button id="confirmBtn" class="btn btn-danger">Remove</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Include main script -->
    <script src="script.js"></script>
</body>
</html>
